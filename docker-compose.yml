name: rainbot

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:latest
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8080:8080"

  # ── One-shot setup ──────────────────────────────────────────────────────────

  temporal-setup:
    image: temporalio/admin-tools:latest
    depends_on:
      - temporal
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until temporal operator cluster health --address temporal:7233 >/dev/null 2>&1; do
          echo "Waiting for Temporal..."
          sleep 2
        done

        temporal operator namespace create --address temporal:7233 rainbot >/dev/null 2>&1 || true
        temporal operator search-attribute create --address temporal:7233 --namespace rainbot --name GuildId --type Keyword >/dev/null 2>&1 || true
        temporal operator search-attribute create --address temporal:7233 --namespace rainbot --name ChannelId --type Keyword >/dev/null 2>&1 || true
        temporal operator search-attribute create --address temporal:7233 --namespace rainbot --name SegmentCount --type Int >/dev/null 2>&1 || true

        echo "Temporal setup complete."
    restart: "no"

  db-migrate:
    image: ghcr.io/rainbow-sands/rainbot-sands/db:main
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    restart: "no"

  # ── Application ─────────────────────────────────────────────────────────────

  discord:
    image: ghcr.io/rainbow-sands/rainbot-sands/discord:main
    depends_on:
      temporal-setup:
        condition: service_completed_successfully
      db-migrate:
        condition: service_completed_successfully
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID}
      MEDIA_PATH: /media
      TEMPORAL_URL: temporal:7233
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - media:/media
    restart: unless-stopped

  temporal-worker:
    image: ghcr.io/rainbow-sands/rainbot-sands/temporal:main
    depends_on:
      temporal-setup:
        condition: service_completed_successfully
      db-migrate:
        condition: service_completed_successfully
    environment:
      TEMPORAL_URL: temporal:7233
      TRANSCRIPTION_URL: ${TRANSCRIPTION_URL}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      WEB_URL: ${ORIGIN}
      TRANSCRIPTION_MODEL: ${TRANSCRIPTION_MODEL}
      SUMMARIZATION_PROVIDER: ${SUMMARIZATION_PROVIDER}
      SUMMARIZATION_API_KEY: ${SUMMARIZATION_API_KEY}
      SUMMARIZATION_BASE_URL: ${SUMMARIZATION_BASE_URL}
      SUMMARIZATION_MODEL: ${SUMMARIZATION_MODEL}
      SUMMARIZATION_REASONING_EFFORT: ${SUMMARIZATION_REASONING_EFFORT}
      SUMMARIZATION_THINKING_BUDGET: ${SUMMARIZATION_THINKING_BUDGET}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MEDIA_PATH: /media
    volumes:
      - media:/media
    restart: unless-stopped

  web:
    image: ghcr.io/rainbow-sands/rainbot-sands/web:main
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      ORIGIN: ${ORIGIN}
      CHAT_PROVIDER: ${CHAT_PROVIDER}
      CHAT_API_KEY: ${CHAT_API_KEY}
      CHAT_BASE_URL: ${CHAT_BASE_URL}
      CHAT_MODEL: ${CHAT_MODEL}
      CHAT_REASONING_EFFORT: ${CHAT_REASONING_EFFORT}
      CHAT_THINKING_BUDGET: ${CHAT_THINKING_BUDGET}
      TEMPORAL_URL: temporal:7233
      MEDIA_PATH: /media
      BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-10G}
    ports:
      - "3000:3000"
    volumes:
      - media:/media
    restart: unless-stopped

volumes:
  postgres_data:
  media:
